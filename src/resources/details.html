<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Details</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <script src="details.js" defer></script>
</head>
<body>
  <header class="container">
    <a href="list.html">← Back to Resources</a>
  </header>
  <main class="container">
    <h1 id="resource-title"></h1>
    <p id="resource-description"></p>
    <a id="resource-link" href="#" target="_blank">Access Resource Material</a>

    <section id="discussion-forum">
      <h2>Discussion</h2>
      <div id="comment-list"></div>
      <form id="comment-form" action="#">
        <fieldset>
          <legend>Leave a Comment</legend>
          <label for="new-comment">Your Comment</label>
          <textarea id="new-comment" required></textarea>
          <button type="submit">Post Comment</button>
        </fieldset>
      </form>
    </section>
  </main>
</body>
</html>
