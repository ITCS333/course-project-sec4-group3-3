<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <style>
    table { width: 100%; }
    thead th { cursor: pointer; user-select: none; }
    thead th:hover { opacity: 0.75; }
    .edit-btn   { margin-right: 0.4rem; }
  </style>
  <script src="manage_users.js" defer></script>
</head>
<body>

  <header class="container">
    <h1>Admin Portal</h1>
  </header>

  <main class="container">

    <!-- Section 1: Password Management -->
    <section>
      <h2>Change Your Password</h2>

      <form action="#" id="password-form">
        <fieldset>
          <legend>Password Update</legend>

          <label for="current-password">Current Password</label>
          <input type="password" id="current-password" name="current-password" required />

          <label for="new-password">New Password</label>
          <input type="password" id="new-password" name="new-password" minlength="8" required />

          <label for="confirm-password">Confirm New Password</label>
          <input type="password" id="confirm-password" name="confirm-password" required />

          <button type="submit" id="change">Update Password</button>
        </fieldset>
      </form>
    </section>

    <!-- Section 2: User Management -->
    <section>
      <h2>Manage Users</h2>

      <!-- Subsection 2.1: Add New User -->
      <details>
        <summary>Add New User</summary>

        <form action="#" id="add-user-form">
          <fieldset>
            <legend>New User Information</legend>

            <label for="user-name">Full Name</label>
            <input type="text" id="user-name" name="user-name" required />

            <label for="user-email">Email Address</label>
            <input type="email" id="user-email" name="user-email" required />

            <label for="default-password">Default Password</label>
            <input type="password" id="default-password" name="default-password" minlength="8" required />

            <label for="is-admin">Role</label>
            <select id="is-admin" name="is-admin">
              <option value="0">Student</option>
              <option value="1">Admin</option>
            </select>

            <button type="submit" id="add">Add User</button>
          </fieldset>
        </form>
      </details>

      <!-- Subsection 2.2: User List -->
      <h3>Registered Users</h3>

      <input type="text" id="search-input" placeholder="Search by name or email..." />

      <table id="user-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Admin</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-table-body"></tbody>
      </table>

    </section>

  </main>

</body>
</html>
