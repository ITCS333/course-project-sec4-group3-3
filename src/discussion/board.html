<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Discussion Board</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />

    <script src="board.js" defer></script>

</head>

<body>

    <header class="container">

        <h1>General Discussion Board</h1>

    </header>

    <main class="container">

        <section>

            <h2>Start a New Topic</h2>

            <form
                id="new-topic-form"
                action="#"
            >

                <fieldset>

                    <legend>
                        New Topic Details
                    </legend>

                    <label for="topic-subject">
                        Topic Subject
                    </label>

                    <input
                        type="text"
                        id="topic-subject"
                        required
                    />

                    <label for="topic-message">
                        Main Message
                    </label>

                    <textarea
                        id="topic-message"
                        rows="6"
                        required
                    ></textarea>

                    <button
                        id="create-topic"
                        type="submit"
                    >
                        Create Topic
                    </button>

                </fieldset>

            </form>

        </section>

        <section>

            <h2>All Topics</h2>

            <div id="topic-list-container">

            </div>

        </section>

    </main>

</body>

</html>
