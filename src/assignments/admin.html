<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>Manage Assignments</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />

    <script src="admin.js" defer></script>
</head>

<body>

    <header class="container">
        <h1>Manage Assignments</h1>

        <a href="list.html">← Back to Assignments</a>
    </header>

    <main class="container">

        <section>

            <h2>Add a New Assignment</h2>

            <form id="assignment-form" action="#">

                <fieldset>

                    <legend>Assignment Details</legend>

                    <label for="assignment-title">
                        Assignment Title
                    </label>

                    <input
                        type="text"
                        id="assignment-title"
                        required
                    />

                    <label for="assignment-description">
                        Description
                    </label>

                    <textarea
                        id="assignment-description"
                        rows="5"
                        required
                    ></textarea>

                    <label for="assignment-due-date">
                        Due Date
                    </label>

                    <input
                        type="date"
                        id="assignment-due-date"
                        required
                    />

                    <label for="assignment-files">
                        File URLs (one per line)
                    </label>

                    <textarea
                        id="assignment-files"
                        rows="3"
                    ></textarea>

                    <button
                        id="add-assignment"
                        type="submit"
                    >
                        Add Assignment
                    </button>

                </fieldset>

            </form>

        </section>

        <section>

            <h2>Current Assignments</h2>

            <table id="assignments-table">

                <thead>

                    <tr>
                        <th>Title</th>
                        <th>Due Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>

                </thead>

                <tbody id="assignments-tbody">

                </tbody>

            </table>

        </section>

    </main>

</body>
</html>
