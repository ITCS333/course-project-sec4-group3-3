<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    main { width: 100%; max-width: 420px; padding: 1rem; }
    #message-container { margin-top: 0.75rem; font-size: 0.9rem; }
    #message-container.error   { color: var(--pico-del-color, #c0392b); }
    #message-container.success { color: var(--pico-ins-color, #27ae60); }
  </style>
  <script src="login.js" defer></script>
</head>
<body>

  <main>
    <section>
      <h1>Welcome Back!</h1>

      <form id="login-form" action="#">
        <fieldset>
          <legend>Secure Login</legend>

          <label for="email">Email Address</label>
          <input type="email" id="email" name="email"
                 placeholder="student@uob.edu.bh" required />

          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="••••••••" minlength="8" required />

          <button type="submit" id="login">Log In</button>
        </fieldset>

        <div id="message-container"></div>
      </form>
    </section>
  </main>

</body>
</html>
