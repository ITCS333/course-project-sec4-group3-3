<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Resources</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <script src="admin.js" defer></script>
</head>
<body>
  <header class="container">
    <h1>Manage Resources</h1>
    <a href="list.html">← Back to Resources</a>
  </header>
  <main class="container">

    <section>
      <h2>Add / Edit Resource</h2>
      <form id="resource-form" action="#">
        <fieldset>
          <legend>Resource Details</legend>
          <label for="resource-title">Title</label>
          <input type="text" id="resource-title" name="resource-title" required />
          <label for="resource-description">Description</label>
          <textarea id="resource-description" name="resource-description"></textarea>
          <label for="resource-link">Link</label>
          <input type="url" id="resource-link" name="resource-link" required />
          <button type="submit" id="add-resource">Add Resource</button>
        </fieldset>
      </form>
    </section>

    <section>
      <h2>Existing Resources</h2>
      <table id="resources-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Link</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="resources-tbody"></tbody>
      </table>
    </section>

  </main>
</body>
</html>
