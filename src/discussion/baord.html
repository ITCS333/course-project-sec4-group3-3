<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Discussion Board</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />

</head>

<body>

    <header class="container">

        <h1>General Discussion Board</h1>

    </header>

    <main class="container">

        <section>

            <h2>Start a New Topic</h2>

            <form
                id="new-topic-form"
                action="#"
            >

                <fieldset>

                    <legend>
                        New Topic Details
                    </legend>

                    <label for="topic-subject">
                        Topic Subject
                    </label>

                    <input
                        type="text"
                        id="topic-subject"
                        required
                    />

                    <label for="topic-message">
                        Main Message
                    </label>

                    <textarea
                        id="topic-message"
                        rows="6"
                        required
                    ></textarea>

                    <button
                        id="create-topic"
                        type="submit"
                    >
                        Create Topic
                    </button>

                </fieldset>

            </form>

        </section>

        <section>

            <h2>All Topics</h2>

            <div id="topics-container">

                <article>

                    <h3>

                        <a href="topic-detail.html">
                            Question about CSS Flexbox
                        </a>

                    </h3>

                    <footer>
                        Posted by: Alex on 2026-05-11
                    </footer>

                    <div>

                        <button>
                            Edit
                        </button>

                        <button>
                            Delete
                        </button>

                    </div>

                </article>

                <article>

                    <h3>

                        <a href="topic-detail.html">
                            JavaScript Async Help
                        </a>

                    </h3>

                    <footer>
                        Posted by: Sarah on 2026-05-10
                    </footer>

                    <div>

                        <button>
                            Edit
                        </button>

                        <button>
                            Delete
                        </button>

                    </div>

                </article>

                <article>

                    <h3>

                        <a href="topic-detail.html">
                            Trouble Understanding APIs
                        </a>

                    </h3>

                    <footer>
                        Posted by: Mike on 2026-05-09
                    </footer>

                    <div>

                        <button>
                            Edit
                        </button>

                        <button>
                            Delete
                        </button>

                    </div>

                </article>

            </div>

        </section>

    </main>

</body>

</html>
